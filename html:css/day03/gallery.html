<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gallery</title>
    <style>
        .container{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: repeat(4, 400px);

            grid-template-areas: 
            "img1 img3 img3"
            "img1 img4 img6"
            "img2 img2 img6"
            "img5 img5 img5";

            gap: 10px; /*사진 틈새 공간*/
            padding: 10%; /*외부 여백*/


        }

        .container:hover .item img:not(:hover){
            filter: grayscale(1); /*선택 이미지만 색, 나머지는 회색*/
            opacity: 0.5;
        }

        img{
            width: 100%;
            height: 100%;
            object-fit:  cover; /*사진 배율 고정*/
            border-radius: 10px; /*사진 테두리 모양*/
        }

        .img1{
            grid-area: img1;

        }
        .img2{
            grid-area: img2;

        }
        .img3{
            grid-area: img3;

        }
        .img4{
            grid-area: img4;

        }
        .img5{
            grid-area: img5;

        }
        .img6{
            grid-area: img6;

        }
    </style>
</head>
<body>
    <div class="container">
        <!--.item.img$*6>img-->
        <div class="item img1">
            <img src="https://imagescdn.gettyimagesbank.com/500/202506/jv14293609.jpg" alt="">
        </div>
        <div class="item img2">
            <img src="https://imagescdn.gettyimagesbank.com/500/202506/jv14304372.jpg" alt="">
        </div>
        <div class="item img3">
            <img src="https://imagescdn.gettyimagesbank.com/500/202512/jv14496455.jpg" alt="">
        </div>
        <div class="item img4">
            <img src="https://imagescdn.gettyimagesbank.com/500/201907/jv11589047.jpg" alt="">
        </div>
        <div class="item img5">
            <img src="https://imagescdn.gettyimagesbank.com/500/202403/jv13384057.jpg" alt="">
        </div>
        <div class="item img6">
            <img src="https://imagescdn.gettyimagesbank.com/500/201907/jv11800707.jpg" alt="">
        </div>






    </div>
</body>
</html>
