<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box_model

    </title>
    <style>
        .wrapper{
            background-color: skyblue;
            border: 1px solid black;
        }
        .box{
            background-color: orange; /*바탕색*/
            border: 1px solid black;  /*테두리*/
            padding: 10px; /*안쪽 여백*/
            margin: 20px; /*바깥쪽 여백*/
        }
    </style>
</head>
<body>
    <!-- div.box / .box 치면 <div class="box"> -->
    <div class="wrapper">
        <div class="box">box</div>
    </div>
</body>
</html>
