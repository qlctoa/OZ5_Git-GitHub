<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
</head>
<body>
    CSS : cascading style sheets, HTML 태그에 디자인을 입히는 언어<br>
    - 글자 색, 글자 크기, 폰트<br>
    - 여백, 정렬, 위치<br>
    - 레이아웃(flex, grid) : 화면에 요소를 어떻게 배치할지<br>
    - 반응형 디자인 : 화면 크기(디바이스)에 따라 레이아웃이 자동으로 바뀌는 디자인<br>
</body>
</html>
