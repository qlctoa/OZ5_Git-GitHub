<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIST</title>
</head>
<body>
    리스트 생성
    <!-- list (목록) -->
    <ul>
        <li>apple</li>  <!-- li : 목록 항목 • -->
        <li>banana</li>
        <li>cherry</li>
    </ul>  <!-- 순서 없는 목록 Unordered list -->



    <!-- 순서 있는 목록 Ordered list -->
    <ol>
        <li>apple</li>
        <li>banana</li>
        <li>cherry</li>
    </ol>

    <!-- 대문자 알파벳 순서 -->
    <ol type="A">  <!-- type 속성 : 목록 항목의 표시 형태 -->
        <li>apple</li>
        <li>banana</li>
        <li>cherry</li>
    </ol>

    <!-- 소문자 알파벳 순서 -->
    <ol type="a">  <!-- type 속성 : 목록 항목의 표시 형태 -->
        <li>apple</li>
        <li>banana</li>
        <li>cherry</li>
    </ol>

    <!-- 대문자 로마자 순서 -->
    <ol type="I">  <!-- type 속성 : 목록 항목의 표시 형태 -->
        <li>apple</li>
        <li>banana</li>
        <li>cherry</li>
    </ol>

    <!-- 소문자 로마자 순서 -->
    <ol type="i">  <!-- type 속성 : 목록 항목의 표시 형태 -->
        <li>apple</li>
        <li>banana</li>
        <li>cherry</li>
    </ol>


</body>
</html>
