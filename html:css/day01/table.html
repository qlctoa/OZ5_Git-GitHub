<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABLE</title>
</head>
<body>. 
    테이블(표) 생성<hr>
    <table border="1">  <!-- table : 표를 생성하는 태그 // border="1" : 테두리 표시     -->
        <!-- 헤드  -->
        <thead>  <!-- thead : 표의 제목 행 -->
            <tr>  <!-- tr : 행 -->
                <th>id</th>  <!-- th(table header) : 제목 셀 -->
                <th>name</th>
                <th>email</th>
            </tr>
        </thead>

        <!-- 바디 -->
        <tbody>  <!-- tbody : 표의 내용 행 -->
            <tr>
                <td>1</td>  <!-- td(table data) : 내용 셀 -->
                <td>alex</td>
                <td>alex@example.com</td>
            </tr>
        </tbody>
        <tbody>  <!-- tbody : 표의 내용 행 -->
            <tr>
                <td>2</td>  <!-- td(table data) : 내용 셀 -->
                <td>bob</td>
                <td>bob@example.com</td>
            </tr>
        </tbody>
        <tbody>  <!-- tbody : 표의 내용 행 -->
            <tr>
                <td>3</td>  <!-- td(table data) : 내용 셀 -->
                <td>chris</td>
                <td>chris@example.com</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
