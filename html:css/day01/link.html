<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINK</title>
</head>
<body>
    <!-- 앵커.com anchor(링크) 삽입 -->
    Visit <a href="https://www.google.com" target="_blank">Google</a> <!-- a : 링크 삽입 태그 // href(hyper reference) : 링크 경로 // target : 링크 열리는 위치 ( _blank : 새창에서 열기 ) -->
</body>
</html>
