<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div> 
        <ul>[이력서]</ul >
    </div>
    <!-- internal CSS -->
    <style>
        /* .class */
        .contents {
            text-align: center;
            font-family: 'Times New Roman', Times, serif;
        }
        /* #id */
        header#name {
            font-size: X-large;
            color: navy;
            font-weight: bold;
        }
        main {
            font-size: 18px;
            text-align: right;
            color: green;
            margin-bottom: 120px;

        }
        /*selector*/
        footer {
            font-size: xx-small;
        }  
    </style>

    <div class="contents">
    <header id="name">박빛샘</header> 
    <main id="job">프론트 엔드 개발자</main>
    <footer>Copyright &#169; 박빛샘</footer>
    </div>


</body>
</html>
