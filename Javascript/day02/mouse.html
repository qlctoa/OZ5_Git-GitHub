<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p>마우스를 올려보세요.</p>

    <script>
        const p = document.querySelector("p")

        function highlightText() {
            p.style.color = "orange"
        }
        
        function dehighlightText() {
            p.style.color = "black"
        }

        function warningText() {
            p.style.color = "red"
        }
        function infomationText() {
            p.style.color = "grean"
        }

        p.addEventListener("mouseover", highlightText)
        p.addEventListener("mouseout", dehighlightText)

    </script>

</body>
</html>
