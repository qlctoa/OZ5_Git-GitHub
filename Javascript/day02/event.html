<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>event</title>
</head>
<body>
    <button>확인</button>
    <script>
        //button 태그 선택(할당)
        const button = document.querySelector("button")
        
        //버튼이 클릭되었을 때, 실행시킬 함수
        function clickButton(){
            alert("클릭 되었습니다!")

        }


        // 버튼에 이벤트 리스너 추가 
        button.addEventListener("click", clickButton)

    </script>
</body>
</html>
